name: release

# Cut a release from the command line:
#   gh workflow run release.yml -f version=0.2.0 -f publish=true
# Flow: bump package.json + tag -> build installers (Windows NSIS + Linux AppImage) -> upload them
# to a GitHub release -> publish it (only if `publish` is set; otherwise it stays a DRAFT). Pushing
# a v* tag by hand still builds a draft too (no version bump, no auto-publish).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 0.2.0 (creates and pushes tag v0.2.0)"
        required: true
        type: string
      publish:
        description: "Publish the release now (unchecked = leave it as a draft)"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write # create/push the tag + create/edit the release

jobs:
  # Manual dispatch only: bump package.json to the requested version, commit, tag, push. electron-
  # updater compares the running app's version against the release, so every release needs a fresh
  # version. A tag pushed with GITHUB_TOKEN does NOT re-trigger the push trigger above (GitHub's
  # recursion guard), so the dispatch flow doesn't double-build.
  tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.cut.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bump version, commit, tag, push
        id: cut
        run: |
          TAG="v${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version "${{ inputs.version }}" --no-git-tag-version
          git add package.json
          git commit -m "release: ${TAG}"
          git tag "$TAG"
          git push origin "HEAD:${{ github.ref_name }}" "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: tag
    # Runs after `tag` on dispatch, and directly on a pushed tag (where `tag` is skipped).
    if: ${{ always() && (needs.tag.result == 'success' || needs.tag.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Lambert and carapace are checked out as SIBLINGS (carapace/ next to lambert/) because the
      # renderer bundles @carapace/shell's source and the main process bundles its compiled dist —
      # the pnpm `link:../carapace` override + the vite alias both resolve to ../carapace.
      - name: Checkout lambert
        uses: actions/checkout@v4
        with:
          path: lambert
          # On dispatch: the freshly-pushed tag; on a tag push: the pushed tag (ref_name).
          ref: ${{ needs.tag.outputs.ref || github.ref_name }}

      - name: Checkout carapace (sibling)
        uses: actions/checkout@v4
        with:
          repository: archwyvern/carapace
          ref: master
          path: carapace

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: lambert/pnpm-lock.yaml

      # carapace shell's compiled dist (dist/fs/node.js) is what the main process bundles; build it.
      - name: Build carapace shell
        working-directory: carapace
        run: |
          pnpm install
          pnpm --filter @carapace/shell build

      - name: Install lambert deps
        working-directory: lambert
        run: pnpm install --frozen-lockfile

      - name: Build renderer/main/preload
        working-directory: lambert
        run: pnpm build

      # electron-builder targets the host OS's configured target (AppImage / nsis) and uploads to the
      # tag's draft release (releaseType: draft by default).
      - name: Package + upload to draft release
        working-directory: lambert
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm exec electron-builder --publish always

  # Manual dispatch with publish=true: flip the draft to a published (latest) release. electron-
  # updater only sees a release once it's published, so this is the deliberate "ship to users" gate.
  publish:
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "v${{ inputs.version }}" --repo "${{ github.repository }}" --draft=false --latest
