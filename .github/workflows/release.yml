name: release

# Cut a release from the command line:
#   gh workflow run release.yml -f version=0.1.0 -f publish=true
#
# IMPORTANT — push before you dispatch. The `tag` job tags the REMOTE branch HEAD, so any local
# unpushed commits are silently excluded and a "fix-less" version can ship. Run `git push` first;
# the `cut` step below echoes the exact SHA + subject it tagged so you can confirm the right commit.
#
# Flow: bump package.json + tag -> build installers (Windows NSIS + Linux AppImage) as ARTIFACTS ->
# a single job assembles ONE GitHub release from all artifacts -> publish it (only if `publish`;
# otherwise it stays a DRAFT). Pushing a v* tag by hand also builds a draft (no bump, no publish).
#
# Why artifacts + one release job instead of `electron-builder --publish` per matrix leg: two legs
# publishing to the same draft concurrently race and split assets across duplicate drafts. Packaging
# with `--publish never` (electron-builder still emits the latest*.yml update feeds) and assembling
# once is race-free.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 0.1.0 (creates and pushes tag v0.1.0)"
        required: true
        type: string
      publish:
        description: "Publish the release now (unchecked = leave it as a draft)"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write # create/push the tag + create/edit the release

jobs:
  # Manual dispatch only: bump package.json to the requested version (skipped if already there, so a
  # first release at the current version just tags HEAD), commit, tag, push. A tag pushed with
  # GITHUB_TOKEN does not re-trigger the push trigger above (GitHub's recursion guard).
  tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.cut.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bump version, commit, tag, push
        id: cut
        run: |
          TAG="v${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "$(node -p "require('./package.json').version")" != "${{ inputs.version }}" ]; then
            npm version "${{ inputs.version }}" --no-git-tag-version
            git add package.json
            git commit -m "release: ${TAG}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
          git rev-parse "$TAG" >/dev/null 2>&1 || git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Surface exactly what got tagged so an operator can catch a stale/wrong HEAD (unpushed fixes).
          echo "### Tagged $TAG" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          git log -1 --format='%H%n%s%n(%ci)' "$TAG" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: tag
    # Runs after `tag` on dispatch, and directly on a pushed tag (where `tag` is skipped).
    if: ${{ always() && (needs.tag.result == 'success' || needs.tag.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Lambert and carapace are checked out as SIBLINGS (carapace/ next to lambert/) because the
      # renderer bundles @carapace/shell's source and the main process bundles its compiled dist.
      - name: Checkout lambert
        uses: actions/checkout@v4
        with:
          path: lambert
          ref: ${{ needs.tag.outputs.ref || github.ref_name }}

      - name: Checkout carapace (sibling)
        uses: actions/checkout@v4
        with:
          repository: archwyvern/carapace
          ref: master
          path: carapace

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: lambert/pnpm-lock.yaml

      # carapace shell's compiled dist (dist/fs/node.js) is what the main process bundles; build it.
      - name: Build carapace shell
        working-directory: carapace
        run: |
          pnpm install
          pnpm --filter @carapace/shell build

      - name: Install lambert deps
        working-directory: lambert
        run: pnpm install --frozen-lockfile

      # Release gate: a red tree must never ship. Same checks ci.yml runs on push/PR, enforced here
      # too because a pushed tag / dispatch can tag a commit that never went through a PR.
      - name: Typecheck + test (release gate)
        working-directory: lambert
        run: |
          pnpm typecheck
          pnpm test

      - name: Build renderer/main/preload
        working-directory: lambert
        run: pnpm build

      # Package only — no upload. electron-builder still emits latest*.yml (the electron-updater
      # feeds) because a publish config is present.
      - name: Package installers
        working-directory: lambert
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm exec electron-builder --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            lambert/release/*.AppImage
            lambert/release/*.exe
            lambert/release/*.blockmap
            lambert/release/latest*.yml
          if-no-files-found: error

  # Single, race-free release assembly: collect every platform's artifacts and create/update ONE
  # release. Creates it as a draft; publishes only when the dispatch asked for it.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Assemble the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TAG="${{ inputs.version && format('v{0}', inputs.version) || github.ref_name }}"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --repo "$REPO" --clobber
          else
            gh release create "$TAG" dist/* --repo "$REPO" --draft --title "$TAG" --generate-notes
          fi

      - name: Publish (if requested)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "v${{ inputs.version }}" --repo "${{ github.repository }}" --draft=false --latest
