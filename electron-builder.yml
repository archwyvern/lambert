appId: com.archwyvern.lambert
productName: Lambert
copyright: Copyright © Archwyvern

# electron-vite bundles the main/preload/renderer into out/ (carapace + chokidar inlined — see
# electron.vite.config.ts), so the packaged app is fully self-contained: just out/ + package.json,
# no runtime node_modules. Keeps the installer small and sidesteps the github/link carapace dep.
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asar: true

# Double-clicking a project.lambert (or any .lambert) opens it in Lambert. The main process resolves
# a project.lambert path to its folder and opens the project; the renderer validates the marker.
fileAssociations:
  - ext: lambert
    name: Lambert Project
    role: Editor

# Draft GitHub release per tag (electron-builder default releaseType: draft). The CI publishes here.
publish:
  provider: github
  owner: archwyvern
  repo: lambert

linux:
  target:
    - AppImage # self-updating Linux format (electron-updater)
  category: Graphics
  maintainer: Archwyvern <codekestrel@googlemail.com>
  synopsis: Shape-based height-field authoring for normal maps.

# Version-less AppImage filename. electron-updater can only overwrite the running AppImage IN PLACE
# when the new file shares its basename; a versioned default name (Lambert-${version}.AppImage)
# forces a delete-old + write-new-name, which strands the .desktop launcher's Exec at the deleted
# path (the 0.1.0 -> 0.1.1 "not found in $PATH" failure). A fixed name updates seamlessly forever.
appImage:
  artifactName: ${productName}.${ext}

win:
  target:
    - nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  # Space-free artifact name. The default (`${productName} Setup ${version}.exe`) has SPACES, which
  # GitHub rewrites to dots on upload (Lambert.Setup.x.exe) while electron-updater's latest.yml uses
  # hyphens (Lambert-Setup-x.exe) — the names never match, so every Windows auto-update download 404s.
  # A hyphenated, space-free name is byte-identical on disk, on the GitHub asset, and in latest.yml.
  artifactName: ${productName}-Setup-${version}.${ext}
